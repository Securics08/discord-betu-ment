<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Discord Tools - 35 Fonts & Dual Neon</title>
<style>
body { font-family:'Segoe UI', sans-serif; background:#313338; color:#eee; padding:20px; display:flex; flex-direction:column; align-items:center; } /* Alap; Alap */
.container { max-width:950px; width:100%; background:#2b2d31; padding:30px; border-radius:15px; border:1px solid #444; box-shadow:0 10px 50px rgba(0,0,0,0.7); margin-bottom:40px; } /* Konténer; Konténer */
.tabs { display:flex; gap:10px; margin-bottom:20px; } /* Fülek; Fülek */
.tab { flex:1; padding:12px; text-align:center; background:#1e1f22; cursor:pointer; border-radius:6px; font-weight:bold; color:#b5bac1; } /* Tab; Tab */
.tab.active { background:#5865f2; color:#fff; } /* Aktív; Aktív */
.section { display:none; } /* Szekció; Szekció */

textarea, select { width:100%; border-radius:6px; border:none; padding:12px; font-size:16px; box-sizing:border-box; resize:vertical; font-family:monospace; background:#1e1f22; color:#dbdee1; border: 1px solid #222; } /* Mezők; Mezők */
.count { text-align:right; font-size:14px; margin-top:5px; color:#39FF14; font-weight:bold; } /* Számláló; Számláló */

.btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; } /* Gombcsoport; Gombcsoport */
button { padding:14px; background:#5865f2; color:#fff; border:none; border-radius:6px; cursor:pointer; font-weight:bold; font-size: 15px; transition: 0.2s; } /* Gomb; Gomb */
button:hover { background: #4752c4; } /* Hover; Hover */
.btn-alt { background: #4e5058; } /* Alt gomb; Alt gomb */

.size-controls { display: flex; align-items: center; gap: 10px; margin: 15px 0; } /* Csúszka; Csúszka */
.step-btn { width: 45px; height: 35px; background: #4e5058; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 20px; } /* Lépés gomb; Lépés gomb */

.color-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(40px, 1fr)); gap:8px; margin-top:10px; background: #1e1f22; padding: 10px; border-radius: 8px; } /* Színrács; Színrács */
.color-item { height:35px; border-radius:4px; cursor:pointer; border:1px solid rgba(255,255,255,0.1); } /* Szín; Szín */
.color-item.active { border:2px solid #fff; box-shadow: 0 0 8px #fff; } /* Aktív szín; Aktív szín */

#preview-container { margin-top:20px; background:#313338; padding:20px; border-radius:10px; border:1px dashed #4e5058; overflow:auto; max-height:400px; min-height:60px; } /* Előnézet; Előnézet */
#preview-text { white-space:pre-wrap; line-height:1.2; display: block; word-break: break-all; } /* Előnézet szöveg; Előnézet szöveg */
</style>
</head>
<body>

<div class="container">
  <div class="tabs">
    <div class="tab active" data-target="neon">Neon (35 Betű + 2 Mód)</div>
    <div class="tab" data-target="ansi">ANSI (Színes)</div>
    <div class="tab" data-target="ini">INI (Kód)</div>
  </div>

  <div id="neon" class="section" style="display:block;">
    <textarea id="inputTextNeon" placeholder="Írd ide a szöveget..."></textarea>
    <div class="count" id="cNeon">0</div>
    
    <select id="fontSelect" style="margin-top:15px;">
        <option value="Arial">Arial</option><option value="'Segoe UI'">Segoe UI</option><option value="Verdana">Verdana</option>
        <option value="Impact">Impact</option><option value="'Arial Black'">Arial Black</option><option value="'Courier New'">Courier New</option>
        <option value="'Lucida Console'">Lucida Console</option><option value="'Trebuchet MS'">Trebuchet MS</option><option value="Georgia">Georgia</option>
        <option value="'Times New Roman'">Times New Roman</option><option value="Palatino">Palatino</option><option value="Copperplate">Copperplate</option>
        <option value="'Comic Sans MS'">Comic Sans</option><option value="'Brush Script MT'">Brush Script</option><option value="Tahoma">Tahoma</option>
        <option value="Geneva">Geneva</option><option value="Helvetica">Helvetica</option><option value="Cambria">Cambria</option>
        <option value="Calibri">Calibri</option><option value="Candara">Candara</option><option value="Optima">Optima</option>
        <option value="Perpetua">Perpetua</option><option value="Monaco">Monaco</option><option value="Consolas">Consolas</option>
        <option value="Garamond">Garamond</option><option value="Didot">Didot</option><option value="Rockwell">Rockwell</option>
        <option value="Baskerville">Baskerville</option><option value="Papyrus">Papyrus</option><option value="'Century Gothic'">Century Gothic</option>
        <option value="Futura">Futura</option><option value="'Franklin Gothic Medium'">Franklin Gothic</option><option value="'Book Antiqua'">Book Antiqua</option>
        <option value="'Segoe Script'">Segoe Script</option><option value="fantasy">Fantasy</option>
    </select>

    <div class="size-controls">
        <button class="step-btn" onclick="stepSize(-5)">-</button>
        <input type="range" id="fsNeon" min="10" max="400" value="40" style="flex:1;">
        <button class="step-btn" onclick="stepSize(5)">+</button>
        <span id="szDisplay" style="min-width:50px;">40px</span>
    </div>

    <div class="color-grid" id="cGrid"></div>

    <div class="btn-group">
        <button onclick="saveNeon('square')">NÉGYZETES MENTÉS</button>
        <button class="btn-alt" onclick="saveNeon('wide')">SZÉLES MENTÉS</button>
    </div>

    <div id="preview-container"><div id="preview-text"></div></div>
  </div>

  <div id="ansi" class="section">
    <textarea id="textAnsi" maxlength="4000" style="height:200px;" placeholder="ANSI szöveg..."></textarea>
    <div class="count" id="cAnsi">0 / 4000</div>
    <select id="ansiCol" style="margin-top:10px;">
        <option value="33" selected>Sárga</option><option value="31">Piros</option><option value="32">Zöld</option><option value="34">Kék</option><option value="35">Lila</option><option value="36">Cián</option><option value="37">Fehér</option>
    </select>
    <button style="width:100%; margin-top:10px;" onclick="cpAnsi()">ANSI MÁSOLÁS</button>
  </div>

  <div id="ini" class="section">
    <textarea id="textIni" maxlength="4000" style="height:300px;" placeholder="INI kód..."></textarea>
    <div class="count" id="cIni">0 / 4000</div>
    <button style="width:100%; margin-top:10px;" onclick="cpIni()">INI MÁSOLÁS</button>
  </div>
</div>

<script>
let selC = "#FFFF00";
const colors = ["#FFFFFF","#000000","#0000FF","#00FF00","#FFFF00","#00FFFF","#FF00FF","#FF0000","#FFA500","#800080","#008000","#800000","#000080","#00FF7F","#FFD700","#DC143C","#00CED1","#FF1493","#ADFF2F","#FF4500","#DA70D6","#1E90FF","#F0E68C","#E6E6FA"];

document.querySelectorAll('.tab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
    t.classList.add('active'); document.getElementById(t.dataset.target).style.display = 'block';
  };
});

const grid = document.getElementById('cGrid');
colors.forEach(c => {
  const d = document.createElement('div'); d.className = 'color-item';
  d.style.backgroundColor = c; if(c === selC) d.classList.add('active');
  d.onclick = () => { selC = c; document.querySelectorAll('.color-item').forEach(i => i.classList.remove('active')); d.classList.add('active'); upNeon(); };
  grid.appendChild(d);
});

function stepSize(v) { const s = document.getElementById('fsNeon'); s.value = parseInt(s.value) + v; upNeon(); }

function upNeon() {
  const p = document.getElementById('preview-text'), i = document.getElementById('inputTextNeon'), f = document.getElementById('fontSelect'), s = document.getElementById('fsNeon');
  p.style.color = selC; p.style.fontFamily = f.value; p.style.fontSize = s.value + 'px';
  p.textContent = i.value; document.getElementById('szDisplay').textContent = s.value + 'px';
  document.getElementById('cNeon').textContent = i.value.length;
}

document.getElementById('inputTextNeon').oninput = upNeon;
document.getElementById('fontSelect').onchange = upNeon;
document.getElementById('fsNeon').oninput = upNeon;

function saveNeon(mode) {
  const text = document.getElementById('inputTextNeon').value;
  if(!text.trim()) return alert("Üres!");
  const fontSize = parseInt(document.getElementById('fsNeon').value);
  const fontName = document.getElementById('fontSelect').value;
  const canvas = document.createElement('canvas'), ctx = canvas.getContext('2d');
  ctx.font = fontSize + "px " + fontName;

  let lines = [];
  if (mode === 'wide') {
    lines = text.split('\n');
  } else {
    const charWidth = ctx.measureText("W").width;
    const targetWrap = Math.max(Math.sqrt(text.length * charWidth * fontSize), fontSize * 10);
    text.split('\n').forEach(p => {
      let words = p.split(' '), current = "";
      words.forEach(w => {
        let test = current + (current ? " " : "") + w;
        if (ctx.measureText(test).width > targetWrap) { lines.push(current); current = w; } else { current = test; }
      });
      lines.push(current);
    });
  }

  let maxW = 0;
  lines.forEach(l => { 
    const w = ctx.measureText(l).width;
    if(w > maxW) maxW = w;
  });

  const padding = fontSize;
  canvas.width = Math.ceil(maxW + (padding * 2.5)); // Biztonsági ráhagyás a szélén ; Biztonsági ráhagyás a szélén
  canvas.height = Math.ceil((lines.length * fontSize * 1.4) + (padding * 2));
  
  ctx.fillStyle = "#313338"; ctx.fillRect(0,0,canvas.width, canvas.height);
  ctx.font = fontSize + "px " + fontName; ctx.fillStyle = selC; ctx.textBaseline = "top";
  
  lines.forEach((l, idx) => {
    ctx.fillText(l, padding, padding + (idx * fontSize * 1.4));
  });

  const a = document.createElement('a'); a.href = canvas.toDataURL(); a.download = `neon_${mode}.png`; a.click();
}

function cpAnsi() { 
  const c = document.getElementById('ansiCol').value, t = document.getElementById('textAnsi').value;
  navigator.clipboard.writeText("```ansi\n\x1b[" + c + "m" + t + "\x1b[0m\n```"); alert("OK"); 
}
function cpIni() { navigator.clipboard.writeText("```ini\n" + document.getElementById('textIni').value + "\n```"); alert("OK"); }

upNeon();
</script>
</body>
</html>
